# Channel weights for the L1 (Source Selector) scorer.
#
# Composite formula per channel for a given hypothesis:
#   score = w_dim   * dimension_affinity[hyp.dimension][channel]
#         + w_force * force_affinity[hyp.force_assignment].weights[channel]
#         + w_sig   * signal_detectability_base[channel]
#         + w_aud   * audience_match_default
#         + w_conf  * confirmation_balance[channel] * 100
#         + w_acc   * data_accessibility[channel]
#
# Channels listed in force_affinity[*].anti_platforms are forced to 0.
# Channels with score < 50 are dropped (configurable in source_selector.py).
#
# All numeric scores are 0–100. confirmation_balance is 0–1.
# Tune freely; this file is hand-curated, not generated.

# Weights per investigation_priority (host enum: high | medium | low)
priority_weights:
  high:
    dimension_affinity:   0.20
    force_alignment:      0.15
    signal_detectability: 0.30
    audience_match:       0.20
    confirmation_balance: 0.10
    data_accessibility:   0.05
  medium:
    dimension_affinity:   0.20
    force_alignment:      0.15
    signal_detectability: 0.25
    audience_match:       0.20
    confirmation_balance: 0.10
    data_accessibility:   0.10
  low:
    dimension_affinity:   0.20
    force_alignment:      0.15
    signal_detectability: 0.20
    audience_match:       0.20
    confirmation_balance: 0.10
    data_accessibility:   0.15

# Fixed per channel — measures ease of access (API quality, scrape feasibility).
data_accessibility:
  google_web:       85
  google_paa:       50   # headless required, CAPTCHA risk
  google_related:   50
  reddit:           90   # PRAW
  quora:            50   # headless + sidebar scrape
  youtube:          85   # YT Data API, quota costs
  youtube_shorts:   85
  tiktok:           40   # no official API; Brave/DDG site: fallback
  instagram_reels:  30   # worst access surface
  news:             80   # Brave News + GDELT
  substack:         65
  trends:           90   # pytrends, no key
  marketplace:      60

# Signal detectability baseline per channel (0–100) — how dense are
# confirm/disconfirm signals when content is on-topic? Multiplied by
# dimension_affinity in the runtime scorer.
signal_detectability_base:
  reddit:           90   # explicit opinion text
  quora:            85   # explicit Q&A
  youtube:          70   # comments + transcripts
  youtube_shorts:   75   # captions + comments
  tiktok:           75   # caption + top comments dense
  instagram_reels:  60   # captions thin, comments emoji-heavy
  news:             65   # signal in framing
  substack:         85   # long-form opinion
  google_web:       55   # SERPs surface signals, per-page extraction needed
  google_paa:       80   # PAA questions ARE signals
  google_related:   75   # related searches ARE consumer language
  trends:           70   # rising_queries ARE signals
  marketplace:      90   # review text dense

# Confirmation balance — can the channel surface BOTH supports & refutes?
confirmation_balance:
  google_web:       0.90
  google_paa:       0.95
  google_related:   0.85
  reddit:           1.00
  quora:            0.95
  youtube:          0.90
  youtube_shorts:   0.85
  tiktok:           0.75
  instagram_reels:  0.60   # IG content skews aspirational
  news:             0.70   # editorialized; refutes underrepresented
  substack:         0.85
  trends:           0.80
  marketplace:      0.95

# Placeholder — real audience-match logic comes in Phase 3 (decomposer
# extracts hypothesis audience segment; scorer compares to platform demographics).
audience_match_default: 70

